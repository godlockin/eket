$schema: "http://json-schema.org/draft-07/schema#"
$id: "eket://protocol/project-status"
title: "Project Status Report"
description: >
  jira/state/project-status.yml - Master 定期更新的全局项目态势快照。
  由 master-poll 循环写入；前端 dashboard / Confluence 可订阅该文件。
type: object
required:
  - last_updated
  - slavers
  - cards
  - progress
properties:
  last_updated:
    type: string
    format: date-time
    description: "ISO8601 UTC"
  slavers:
    type: object
    required: [active, idle, busy]
    properties:
      active: { type: array, items: { type: string } }
      idle:   { type: array, items: { type: string } }
      busy:   { type: array, items: { type: string } }
    additionalProperties: false
  cards:
    type: object
    required: [milestones, sprints, epics, tickets]
    properties:
      milestones: { type: array, items: { type: string } }
      sprints:    { type: array, items: { type: string } }
      epics:      { type: array, items: { type: string } }
      tickets:    { type: array, items: { type: string } }
    additionalProperties: false
  progress:
    type: object
    required: [completed, total]
    properties:
      sprint_target:  { type: [string, "null"] }
      deadline:       { type: [string, "null"], format: date-time }
      days_remaining: { type: [integer, "null"], minimum: 0 }
      completed:      { type: integer, minimum: 0 }
      total:          { type: integer, minimum: 0 }
      completion_rate:
        type: string
        pattern: "^[0-9]{1,3}%$"
    additionalProperties: false
  risks:
    type: array
    items: { type: string }
  action_items:
    type: array
    items: { type: string }
additionalProperties: false
