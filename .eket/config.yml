# EKET 智能体系统 - 项目配置 v0.9.1
#
# 配置采用模块化设计，主配置文件引用各模块配置
# 模块配置位于 config/ 目录下

version: "0.9.1"

# ==================== 模块化配置引用 ====================

# 模块加载顺序 (不要修改注释格式，脚本需要解析)
# @load config/project.yml
# @load config/tasks.yml
# @load config/monitoring.yml
# @load config/permissions.yml
# @load config/git.yml
# @load config/review_merge.yml
# @load config/process.yml
# @load config/testing.yml
# @load config/memory_log.yml
# @load config/advanced.yml

# ==================== 快速配置覆盖 ====================
# 在此处定义的参数会覆盖模块配置中的值

# 项目基本信息 (示例)
# project:
#   name: "MyProject"
#   stage: "phase_1"

# 模式选择
mode: "claude_code"

# 预设配置 (lightweight | standard | enterprise)
# lightweight: 适合小型项目，禁用高级功能
# standard: 默认配置，适合中型项目
# enterprise: 启用所有功能，适合大型项目
profile: "standard"

# ==================== 环境变量引用 ====================
# 使用 ${ENV_VAR} 格式引用环境变量

# API 密钥 (从环境变量读取)
# api_key: ${GEMINI_API_KEY}

# ==================== 配置验证 ====================
# 启动时验证配置
validation:
  enabled: true
  strict_mode: false

# ==================== OpenCLAW 集成配置 ====================

openclaw:
  enabled: false  # 启用 OpenCLAW 集成
  mode: managed   # managed | autonomous

  # API Gateway 配置
  gateway:
    port: 8080
    host: localhost
    auth:
      type: api_key
      key_env: OPENCLAW_API_KEY

  # 消息队列配置
  message_queue:
    type: redis  # redis | rabbitmq | file
    connection:
      host: ${REDIS_HOST:-localhost}
      port: ${REDIS_PORT:-6379}
    channels:
      task_assignment: "openclaw:tasks:assign"
      status_update: "openclaw:tasks:status"
      agent_lifecycle: "openclaw:agents:lifecycle"

  # Agent 配置
  agents:
    auto_spawn: true
    max_concurrent: 5
    idle_timeout: 3600  # 1 小时无任务自动休眠

  # 人类参与配置
  human_in_loop:
    requirements_review: true
    tech_design_approval: true
    pr_final_signoff: false  # false=Master 可批准

# ==================== 配置合并说明 ====================
#
# 配置合并规则:
# 1. 模块配置首先加载
# 2. 主配置中的值覆盖模块配置
# 3. 环境变量最后替换
#
# 示例:
# - 模块 config/tasks.yml 定义 timeout_minutes: 180
# - 主配置定义 tasks.timeout_minutes: 240
# - 最终使用 240
#
