<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>.line{fill:none;stroke:#333;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}</style>
  <!-- 头部 -->
  <circle cx="100" cy="45" r="20" class="line"/>
  <!-- 身体 -->
  <line x1="100" y1="65" x2="100" y2="120" class="line"/>
  <!-- 左臂高举 -->
  <line x1="100" y1="80" x2="60" y2="50" class="line"/>
  <line x1="60" y1="50" x2="50" y2="30" class="line"/>
  <!-- 右臂高举 -->
  <line x1="100" y1="80" x2="140" y2="50" class="line"/>
  <line x1="140" y1="50" x2="150" y2="30" class="line"/>
  <!-- 左腿跳跃 -->
  <line x1="100" y1="120" x2="70" y2="155" class="line"/>
  <line x1="70" y1="155" x2="65" y2="180" class="line"/>
  <!-- 右腿跳跃 -->
  <line x1="100" y1="120" x2="130" y2="155" class="line"/>
  <line x1="130" y1="155" x2="135" y2="180" class="line"/>
  <!-- 欢呼效果 -->
  <line x1="45" y1="20" x2="40" y2="10" class="line"/>
  <line x1="155" y1="20" x2="160" y2="10" class="line"/>
  <line x1="50" y1="25" x2="40" y2="25" class="line"/>
  <line x1="150" y1="25" x2="160" y2="25" class="line"/>
</svg>
