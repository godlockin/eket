<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>.line{fill:none;stroke:#333;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}</style>
  <!-- 头部 -->
  <circle cx="80" cy="45" r="20" class="line"/>
  <!-- 身体 -->
  <line x1="80" y1="65" x2="80" y2="120" class="line"/>
  <!-- 左臂自然下垂 -->
  <line x1="80" y1="80" x2="55" y2="110" class="line"/>
  <!-- 右臂指向右侧 -->
  <line x1="80" y1="80" x2="120" y2="80" class="line"/>
  <line x1="120" y1="80" x2="160" y2="80" class="line"/>
  <!-- 箭头 -->
  <line x1="150" y1="70" x2="160" y2="80" class="line"/>
  <line x1="150" y1="90" x2="160" y2="80" class="line"/>
  <!-- 左腿 -->
  <line x1="80" y1="120" x2="55" y2="170" class="line"/>
  <!-- 右腿 -->
  <line x1="80" y1="120" x2="105" y2="170" class="line"/>
</svg>
