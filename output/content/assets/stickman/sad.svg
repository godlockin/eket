<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>.line{fill:none;stroke:#333;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}</style>
  <!-- 头部低垂 -->
  <circle cx="100" cy="55" r="20" class="line"/>
  <!-- 身体微弯 -->
  <path d="M 100 75 Q 95 95 100 120" class="line"/>
  <!-- 左臂下垂 -->
  <line x1="95" y1="85" x2="70" y2="115" class="line"/>
  <!-- 右臂下垂 -->
  <line x1="100" y1="85" x2="125" y2="115" class="line"/>
  <!-- 左腿 -->
  <line x1="100" y1="120" x2="80" y2="170" class="line"/>
  <!-- 右腿 -->
  <line x1="100" y1="120" x2="120" y2="170" class="line"/>
  <!-- 沮丧线 -->
  <path d="M 85 35 Q 80 30 85 25" class="line"/>
  <path d="M 115 35 Q 120 30 115 25" class="line"/>
</svg>
