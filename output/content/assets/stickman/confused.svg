<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>.line{fill:none;stroke:#333;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}</style>
  <!-- 头部微侧 -->
  <circle cx="105" cy="45" r="20" class="line"/>
  <!-- 身体 -->
  <line x1="100" y1="65" x2="100" y2="120" class="line"/>
  <!-- 左臂自然下垂 -->
  <line x1="100" y1="80" x2="65" y2="105" class="line"/>
  <!-- 右臂挠头 -->
  <line x1="100" y1="80" x2="115" y2="65" class="line"/>
  <line x1="115" y1="65" x2="120" y2="45" class="line"/>
  <!-- 挠头效果 -->
  <path d="M 125 40 Q 130 35 128 45" class="line"/>
  <path d="M 130 50 Q 135 48 132 55" class="line"/>
  <!-- 左腿 -->
  <line x1="100" y1="120" x2="75" y2="170" class="line"/>
  <!-- 右腿 -->
  <line x1="100" y1="120" x2="125" y2="170" class="line"/>
  <!-- 问号 -->
  <text x="60" y="40" font-family="Arial" font-size="18" fill="#333">?</text>
</svg>
