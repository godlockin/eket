<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>.line{fill:none;stroke:#333;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}</style>
  <!-- 左边人物 -->
  <!-- 头部 -->
  <circle cx="55" cy="45" r="18" class="line"/>
  <!-- 身体 -->
  <line x1="55" y1="63" x2="55" y2="115" class="line"/>
  <!-- 左臂 -->
  <line x1="55" y1="78" x2="30" y2="100" class="line"/>
  <!-- 右臂伸出握手 -->
  <line x1="55" y1="78" x2="85" y2="95" class="line"/>
  <!-- 左腿 -->
  <line x1="55" y1="115" x2="35" y2="165" class="line"/>
  <!-- 右腿 -->
  <line x1="55" y1="115" x2="70" y2="165" class="line"/>

  <!-- 右边人物 -->
  <!-- 头部 -->
  <circle cx="145" cy="45" r="18" class="line"/>
  <!-- 身体 -->
  <line x1="145" y1="63" x2="145" y2="115" class="line"/>
  <!-- 左臂伸出握手 -->
  <line x1="145" y1="78" x2="115" y2="95" class="line"/>
  <!-- 右臂 -->
  <line x1="145" y1="78" x2="170" y2="100" class="line"/>
  <!-- 左腿 -->
  <line x1="145" y1="115" x2="130" y2="165" class="line"/>
  <!-- 右腿 -->
  <line x1="145" y1="115" x2="165" y2="165" class="line"/>

  <!-- 握手 -->
  <ellipse cx="100" cy="95" rx="15" ry="8" class="line"/>
</svg>
