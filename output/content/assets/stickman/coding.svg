<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>.line{fill:none;stroke:#333;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}</style>
  <!-- 头部 -->
  <circle cx="100" cy="35" r="18" class="line"/>
  <!-- 身体坐姿 -->
  <line x1="100" y1="53" x2="100" y2="100" class="line"/>
  <!-- 左臂打字 -->
  <line x1="100" y1="70" x2="70" y2="85" class="line"/>
  <line x1="70" y1="85" x2="55" y2="100" class="line"/>
  <!-- 右臂打字 -->
  <line x1="100" y1="70" x2="130" y2="85" class="line"/>
  <line x1="130" y1="85" x2="145" y2="100" class="line"/>
  <!-- 腿部坐姿 -->
  <line x1="100" y1="100" x2="70" y2="110" class="line"/>
  <line x1="70" y1="110" x2="65" y2="140" class="line"/>
  <line x1="100" y1="100" x2="130" y2="110" class="line"/>
  <line x1="130" y1="110" x2="135" y2="140" class="line"/>
  <!-- 桌子 -->
  <line x1="40" y1="105" x2="160" y2="105" class="line"/>
  <!-- 电脑屏幕 -->
  <rect x="80" y="115" width="40" height="30" class="line"/>
  <line x1="100" y1="145" x2="100" y2="155" class="line"/>
  <line x1="85" y1="155" x2="115" y2="155" class="line"/>
  <!-- 键盘 -->
  <rect x="60" y="160" width="80" height="15" rx="2" class="line"/>
</svg>
