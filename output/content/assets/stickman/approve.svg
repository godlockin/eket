<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>.line{fill:none;stroke:#333;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}</style>
  <!-- 头部微微前倾 -->
  <circle cx="105" cy="50" r="20" class="line"/>
  <!-- 身体 -->
  <line x1="100" y1="70" x2="100" y2="120" class="line"/>
  <!-- 左臂 -->
  <line x1="100" y1="85" x2="65" y2="105" class="line"/>
  <!-- 右臂竖大拇指 -->
  <line x1="100" y1="85" x2="135" y2="95" class="line"/>
  <line x1="135" y1="95" x2="145" y2="75" class="line"/>
  <!-- 左腿 -->
  <line x1="100" y1="120" x2="75" y2="170" class="line"/>
  <!-- 右腿 -->
  <line x1="100" y1="120" x2="125" y2="170" class="line"/>
  <!-- 点头运动线 -->
  <path d="M 120 35 Q 130 40 125 50" class="line"/>
</svg>
