<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>.line{fill:none;stroke:#333;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}</style>
  <!-- 头部 -->
  <circle cx="100" cy="45" r="20" class="line"/>
  <!-- 身体 -->
  <line x1="100" y1="65" x2="100" y2="120" class="line"/>
  <!-- 左臂放下 -->
  <line x1="100" y1="80" x2="70" y2="100" class="line"/>
  <!-- 右臂举起 -->
  <line x1="100" y1="80" x2="130" y2="50" class="line"/>
  <line x1="130" y1="50" x2="140" y2="35" class="line"/>
  <!-- 左腿 -->
  <line x1="100" y1="120" x2="75" y2="170" class="line"/>
  <!-- 右腿 -->
  <line x1="100" y1="120" x2="125" y2="170" class="line"/>
  <!-- 问号 -->
  <text x="150" y="45" font-family="Arial" font-size="24" fill="#333">?</text>
</svg>
