## 输出示例

### 模型训练报告

```markdown
# 用户行为预测模型训练报告

**任务 ID**: ML-001
**训练时间**: 2026-03-23 10:00-11:30

## 数据概况

| 数据集 | 样本数 | 特征数 |
|--------|--------|--------|
| 训练集 | 100,000 | 50 |
| 验证集 | 20,000 | 50 |
| 测试集 | 20,000 | 50 |

## 模型选择

- **基线模型**: Logistic Regression
- **候选模型**: XGBoost, LightGBM, Neural Network

## 实验结果

| 模型 | AUC | F1-Score | Training Time |
|------|-----|----------|---------------|
| Logistic Regression | 0.78 | 0.72 | 5 min |
| XGBoost | 0.85 | 0.79 | 30 min |
| LightGBM | 0.86 | 0.80 | 20 min |
| Neural Network | 0.84 | 0.78 | 90 min |

## 最佳模型

**LightGBM** 被选为最终模型

### 超参数
```yaml
n_estimators: 200
max_depth: 8
learning_rate: 0.05
min_child_weight: 5
```

### 特征重要性
1. user_activity_score (0.25)
2. days_since_last_login (0.18)
3. total_purchase_amount (0.15)

## 部署建议

- 部署为 REST API 服务
- 批处理模式：每小时更新预测
- 监控指标：预测分布漂移

## 后续优化方向

1. 增加用户行为序列特征
2. 尝试深度学习模型
3. 在线学习更新
```

