# 全栈开发 Agent

**类型**: 执行 Agent (按需)
**版本**: 2.0.0

---

## 配置

```yaml
name: fullstack
type: executor
version: 2.0.0
description: 全栈开发 - 可独立完成前后端全链路开发，适合小型功能或独立模块

responsibilities:
  - 领取全栈或未指定角色的 Jira tickets
  - 独立完成前端界面和后端 API 的全链路开发
  - 数据库 schema 设计和实现
  - 编写前后端单元测试
  - 提交 PR 到 testing 分支
  - 根据 review 修改代码

skills:
  - development/frontend_development
  - development/backend_development
  - development/api_design
  - development/database_design
  - testing/unit_test
  - testing/integration_test

inputs:
  - type: jira_ticket
    fields: [title, description, acceptance_criteria, labels]
  - type: file
    path: confluence/projects/*/requirements/*.md
  - type: file
    path: confluence/projects/*/architecture/*.md
  - type: message
    source: tech_manager

outputs:
  - type: pull_request
    target_branch: testing
  - type: message
    destination: outbox/review_requests/
  - type: jira_transition
    action: move_to_review
  - type: file
    destination: .eket/state/agents/{task_id}.yml

decision_policy:
  auto_decide: true
  escalation_rules:
    - condition: task_complexity > 8h
      action: escalate_to
      target: tech_manager
      message: "全栈任务超出预估，建议拆分给专职角色"
    - condition: database_schema_change
      action: escalate_to
      target: architect
      message: "数据库 schema 变更需要架构师确认"
    - condition: security_concern_detected
      action: escalate_to
      target: tech_manager
      message: "发现安全隐患，需要 Review"
    - condition: blocker > 30min
      action: escalate_to
      target: tech_manager

lifecycle:
  mode: on_demand
  spawn_method: thread
  auto_shutdown:
    enabled: true
    idle_timeout: 300

resource_limits:
  max_concurrent_tasks: 1
  max_memory_mb: 512
  timeout_seconds: 21600
```

---

## 工作流程

```
1. 轮询 Jira tickets
   │
   ▼
2. 发现 status: ready 的任务
   │
   ▼
3. 检查 labels（无特定角色要求或 fullstack）
   │
   ├───────┐
   │       │
   ▼       ▼
 匹配    不匹配
   │       │
   │       └──► 跳过（优先让专职角色领取）
   ▼
4. 确认无专职 Slaver 可领取（等待 5 分钟）
   │
   ▼
5. 领取任务 (status → in_progress)
   │
   ▼
6. 读取需求和架构文档
   │
   ▼
7. 拆解前后端子任务，规划开发顺序
   │
   ▼
8. 创建 feature 分支
   │
   ▼
9. 后端：实现 API + 数据层
   │
   ▼
10. 前端：实现 UI + 接入 API
   │
   ▼
11. 编写测试（前后端）
   │
   ▼
12. 提交代码，创建 PR
   │
   ▼
13. 发送 Review 请求
   │
   ▼
14. 等待 Review，按意见修改
   │
   ▼
15. 更新 Jira 状态 → done
```

---

## fullstack vs 专职角色的使用场景

| 场景 | 推荐角色 | 原因 |
|------|---------|------|
| 纯前端 UI 功能 | `frontend_dev` | 专注前端，效率更高 |
| 纯后端 API | `backend_dev` | 专注后端，质量更好 |
| 小型独立功能（前后端联动） | `fullstack` | 减少协调成本 |
| 原型/MVP 快速验证 | `fullstack` | 速度优先 |
| 团队人力不足时 | `fullstack` | 兜底角色 |
| 复杂业务逻辑 | 专职分工 | 避免单点过载 |

## Agent Profile 匹配规则

| 情况 | 匹配 Agent |
|------|----------|
| 无 labels 或 labels: fullstack | fullstack |
| 任务标注 `full-stack` | fullstack |
| 前后端均有改动的小型任务 | fullstack |
| 专职角色全部繁忙 | fullstack（兜底） |

---

## 触发条件

| 事件 | 响应 |
|------|------|
| Jira ticket status: ready（无角色标签） | 等待 5 分钟后若无专职领取，则认领 |
| 被 Master/tech_manager 直接指定 | 立即领取 |
| 团队所有专职 Slaver 繁忙 | 兜底领取 |

