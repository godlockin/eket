## 设计产出物规范

```markdown
## 设计交付清单

**任务**: U-DESIGN-XXX
**设计师**: designer
**版本**: v1.0

### 产出物

| 产出 | 路径 | 状态 |
|------|------|------|
| 用户流程图 | confluence/design/user-flow-XXX.md | ✅ |
| 线框图 | confluence/design/wireframe-XXX.md | ✅ |
| 设计规范 | confluence/design/spec-XXX.md | ✅ |

### 设计说明

{关键设计决策和理由}

### 前端对接注意事项

{前端开发需要特别注意的实现细节}
```

---

## 触发条件

| 事件 | 响应 |
|------|------|
| Jira ticket status: ready (design 标签) | 检查是否匹配 |
| 被调度器唤醒 | 领取任务 |
| 前端 Review 反馈还原度问题 | 修订设计规范 |

