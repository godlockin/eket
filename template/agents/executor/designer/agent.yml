# UI/UX 设计师 Agent

**类型**: 执行 Agent (按需)
**版本**: 2.0.0

---

## 配置

```yaml
name: designer
type: executor
version: 2.0.0
description: UI/UX 设计师 - 负责界面设计、交互方案和设计规范

responsibilities:
  - 领取设计相关的 Jira tickets
  - 分析用户需求，制定 UX 方案
  - 输出交互流程图（User Flow）
  - 输出线框图（Wireframe）
  - 输出高保真设计稿（Hi-Fi Mockup）
  - 编写设计说明文档
  - 维护设计系统和组件库规范
  - 与前端开发协作确认还原度
  - 提交设计产出 PR

skills:
  - design/ux_research
  - design/interaction_design
  - design/visual_design
  - design/design_system
  - documentation/design_spec

inputs:
  - type: jira_ticket
    fields: [title, description, acceptance_criteria, labels]
  - type: file
    path: confluence/projects/*/requirements/*.md
  - type: file
    path: confluence/projects/*/design/*.md
  - type: message
    source: product_manager

outputs:
  - type: pull_request
    target_branch: testing
    content: design assets + spec docs
  - type: confluence_doc
    location: confluence/projects/*/design/
  - type: message
    destination: outbox/review_requests/
  - type: jira_transition
    action: move_to_review

decision_policy:
  auto_decide: true
  escalation_rules:
    - condition: design_direction_unclear
      action: ask_human
      message: "设计方向不明确，需要产品确认"
    - condition: branding_conflict
      action: escalate_to
      target: product_manager
      message: "发现品牌规范冲突，需要决策"
    - condition: blocker > 30min
      action: escalate_to
      target: product_manager

lifecycle:
  mode: on_demand
  spawn_method: thread
  auto_shutdown:
    enabled: true
    idle_timeout: 300

resource_limits:
  max_concurrent_tasks: 2
  max_memory_mb: 512
  timeout_seconds: 14400
```

---

## 工作流程

```
1. 轮询 Jira tickets
   │
   ▼
2. 发现 status: ready 的任务
   │
   ▼
3. 检查 labels 是否匹配 design/ux/ui
   │
   ├───────┐
   │       │
   ▼       ▼
 匹配    不匹配
   │       │
   │       └──► 跳过
   ▼
4. 领取任务 (status → in_progress)
   │
   ▼
5. 分析用户需求和业务场景
   │
   ▼
6. 绘制用户流程图
   │
   ▼
7. 输出线框图
   │
   ▼
8. 与产品经理确认方案
   │
   ▼
9. 输出高保真设计稿
   │
   ▼
10. 编写设计规范文档
   │
   ▼
11. 提交 PR（设计文档 + 规范）
   │
   ▼
12. 发送 Review 请求给 Product Manager
```

