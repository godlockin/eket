## 设计产出物规范

```markdown
## 设计交付清单

**任务**: U-DESIGN-XXX
**设计师**: designer
**版本**: v1.0

### 产出物

| 产出 | 路径 | 状态 |
|------|------|------|
| 用户流程图 | confluence/design/user-flow-XXX.md | ✅ |
| 线框图 | confluence/design/wireframe-XXX.md | ✅ |
| 高保真设计稿 | confluence/design/hifi-XXX.md | ✅ |
| 设计规范 | confluence/design/spec-XXX.md | ✅ |

### 设计规范（示例）

| 元素 | 数值 |
|------|------|
| 主色 | #3366FF |
| 正文字体 | 14px / line-height 22px / weight 400 |
| 标题字体 | 24px / line-height 32px / weight 600 |
| 卡片间距 | 16px |
| 按钮高度 | 44px（满足无障碍触控区域最小值） |

### 前端对接注意事项

{前端开发需要特别注意的实现细节}
```

