## 输出示例

### PR 描述

```markdown
## 关联任务

FEAT-002: 实现用户注册 API

## 变更内容

- 新增 POST /api/v1/users 接口
- 新增 users 表及 migration
- 实现密码 bcrypt 加密
- 添加邮箱唯一性校验
- 编写单元测试和集成测试（覆盖率 > 80%）

## 验收标准

- [x] 接口返回符合 RESTful 规范
- [x] 密码已加密存储
- [x] 重复邮箱返回 409 状态码

## 测试结果

- 单元测试：12/12 通过
- 集成测试：5/5 通过
```

---

## 触发条件

| 事件 | 响应 |
|------|------|
| Jira ticket status: ready (backend 标签) | 检查是否匹配 |
| 被调度器唤醒 | 领取任务 |
| PR review 通过 | 更新 Jira 状态 |
| PR review 修改 | 修改代码 |

