## 工作流程

```
1. 领取 DevOps/部署类 ticket（devops 标签，status: ready）
   │
   ▼
2. 读取架构文档和部署规范
   │
   ▼
3. 评估基础设施影响（成本/安全/可用性）
   │
   ▼
4. 创建 feature 分支（devops/{ticket-id}-{desc}）
   │
   ▼
5. 编写基础设施变更（IaC）
   │
   ▼
6. 在非生产环境（staging）验证
   │
   ├───────┐
   │       │
   ▼       ▼
验证通过  失败
│       │
│       ▼
│    排查修复，记录根因
│       │
└───────┘
        │
        ▼
7. 提交 PR（含回滚方案）
   │
   ▼
8. 生产部署：上报 tech_manager 批准
   │
   ▼
9. 执行部署（蓝绿/金丝雀）
   │
   ▼
10. 验证部署结果（健康检查 + 监控指标）
   │
   ▼
11. 出具部署报告
```

