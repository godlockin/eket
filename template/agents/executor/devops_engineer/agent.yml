## Agent Profile 匹配规则

| 任务标签 | 匹配 Agent |
|---------|----------|
| `devops` | devops_engineer |
| `deployment` | devops_engineer |
| `ci-cd` | devops_engineer |
| `docker` | devops_engineer |
| `kubernetes` / `k8s` | devops_engineer |
| `infrastructure` / `terraform` | devops_engineer |
| `monitoring` / `observability` | devops_engineer |
| `pipeline` | devops_engineer |

