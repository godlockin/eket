## 触发条件

| 事件 | 响应 |
|------|------|
| Jira ticket status: ready | 检查是否匹配 |
| 被调度器唤醒 | 领取任务 |
| PR review 通过 | 更新 Jira 状态 |
| PR review 修改 | 修改代码 |

