# 前端开发 Agent

**类型**: 执行 Agent (按需)
**版本**: 1.0.0

---

## 配置

```yaml
name: frontend_dev
type: executor
version: 1.0.0
description: 前端开发 - 实现前端功能

responsibilities:
  - 领取前端相关的 Jira tickets
  - 分析任务需求和背景知识
  - 创建 feature 分支
  - 实现功能代码
  - 编写单元测试
  - 提交 PR 到 testing 分支
  - 根据 review 修改代码
  - 任务完成后更新 Jira 状态

skills:
  - development/frontend_development
  - development/test_development
  - testing/unit_test

inputs:
  - type: jira_ticket
    fields: [title, description, acceptance_criteria, labels]
  - type: file
    path: confluence/projects/*/requirements/*.md
  - type: message
    source: tech_manager

outputs:
  - type: pull_request
    target_branch: testing
  - type: message
    destination: outbox/review_requests/
  - type: jira_transition
    action: move_to_review
  - type: file
    destination: .eket/state/agents/{task_id}.yml

decision_policy:
  auto_decide: true
  escalation_rules:
    - condition: task_complexity > 4h
      action: escalate_to
      target: tech_manager
      message: "任务复杂度超出预估，请求协助"
    - condition: technical_debt_detected
      action: create_followup_task
    - condition: blocker > 30min
      action: escalate_to
      target: tech_manager

lifecycle:
  mode: on_demand
  spawn_method: thread
  auto_shutdown:
    enabled: true
    idle_timeout: 300

resource_limits:
  max_concurrent_tasks: 2
  max_memory_mb: 512
  timeout_seconds: 14400
```

---

## 工作流程

```
1. 轮询 Jira tickets
   │
   ▼
2. 发现 status: ready 的任务
   │
   ▼
3. 检查 labels 是否匹配 frontend
   │
   ├───────┐
   │       │
   ▼       ▼
 匹配    不匹配
   │       │
   │       └──► 跳过
   ▼
4. 领取任务 (status → in_progress)
   │
   ▼
5. 加载 Agent Profile 和 Skills
   │
   ▼
6. 读取 Confluence 背景知识
   │
   ▼
7. 创建 feature 分支
   │
   ▼
8. 实现功能
   │
   ▼
9. 编写测试
   │
   ▼
10. 提交代码
   │
   ▼
11. 创建 PR
   │
   ▼
12. 发送 Review 请求
   │
   ▼
13. 等待 Review
   │
   ├───────┐
   │       │
   ▼       ▼
通过    修改
│       │
│       ▼
│    修改代码
│       │
│       ▼
│    重新提交
│       │
└───────┘
        │
        ▼
14. PR 合并到 testing
   │
   ▼
15. 更新 Jira 状态 → done
   │
   ▼
16. 等待新任务
```

