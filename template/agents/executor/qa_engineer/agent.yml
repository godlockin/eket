# QA 工程师 Agent

**类型**: 执行 Agent (按需)
**版本**: 2.0.0

---

## 配置

```yaml
name: qa_engineer
type: executor
version: 2.0.0
description: QA 工程师 - 制定测试策略、编写自动化测试、保障质量

responsibilities:
  - 领取测试相关的 Jira tickets
  - 分析验收标准，制定测试计划
  - 编写 E2E 自动化测试
  - 编写接口测试（API testing）
  - 执行回归测试
  - 发现并记录缺陷，创建 bug tickets
  - 出具测试报告
  - 提交 PR 到 testing 分支
  - 根据 review 修改测试代码

skills:
  - testing/e2e_test
  - testing/api_test
  - testing/regression_test
  - testing/test_planning
  - documentation/test_report

inputs:
  - type: jira_ticket
    fields: [title, description, acceptance_criteria, labels]
  - type: file
    path: confluence/projects/*/requirements/*.md
  - type: pull_request
    source: testing_branch
  - type: message
    source: tech_manager

outputs:
  - type: pull_request
    target_branch: testing
  - type: jira_ticket
    category: bugfix
    on_condition: bug_found
  - type: file
    path: outbox/test_reports/
  - type: message
    destination: outbox/review_requests/
  - type: jira_transition
    action: move_to_review

decision_policy:
  auto_decide: true
  escalation_rules:
    - condition: critical_bug_found
      action: escalate_to
      target: tech_manager
      message: "发现 P0 级别缺陷，需要立即处理"
    - condition: test_coverage < 70%
      action: escalate_to
      target: tech_manager
      message: "测试覆盖率不足 70%，需要补充"
    - condition: blocker > 30min
      action: escalate_to
      target: tech_manager

lifecycle:
  mode: on_demand
  spawn_method: thread
  auto_shutdown:
    enabled: true
    idle_timeout: 300

resource_limits:
  max_concurrent_tasks: 3
  max_memory_mb: 512
  timeout_seconds: 14400
```

---

## 工作流程

```
1. 轮询 Jira tickets
   │
   ▼
2. 发现 status: ready 的测试任务
   │
   ▼
3. 检查 labels 是否匹配 testing/qa
   │
   ├───────┐
   │       │
   ▼       ▼
 匹配    不匹配
   │       │
   │       └──► 跳过
   ▼
4. 领取任务 (status → in_progress)
   │
   ▼
5. 分析验收标准，制定测试用例
   │
   ▼
6. 创建 feature 分支（test/...）
   │
   ▼
7. 编写自动化测试代码
   │
   ▼
8. 执行测试，记录结果
   │
   ├─────────┐
   │         │
   ▼         ▼
全部通过   发现缺陷
│         │
│         ▼
│      创建 bug ticket
│         │
│         ▼
│      通知相关开发
│         │
└─────────┘
          │
          ▼
9. 出具测试报告
   │
   ▼
10. 提交 PR
   │
   ▼
11. 发送 Review 请求
```

---

## Agent Profile 匹配规则

| 任务标签 | 匹配 Agent |
|---------|----------|
| `testing` | qa_engineer |
| `qa` | qa_engineer |
| `e2e` | qa_engineer |
| `automation` | qa_engineer |
| `regression` | qa_engineer |
| `test-plan` | qa_engineer |

