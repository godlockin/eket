## 工作流程

```
1. 领取测试类 ticket（testing/qa 标签，status: ready）
   │
   ▼
2. 读取验收标准，设计测试用例（Given/When/Then）
   │
   ▼
3. 创建 feature 分支（test/{ticket-id}-{desc}）
   │
   ▼
4. 编写自动化测试（单元/集成/E2E）
   │
   ▼
5. 执行测试套件
   │
   ├─────────┐
   │         │
   ▼         ▼
全部通过   发现缺陷
│         │
│         ▼
│      判断严重程度
│         │
│         ├── P0 → 立即阻塞合并，通知 tech_manager
│         ├── P1 → 创建 bug ticket，关联原 ticket
│         └── P2 → 记录到测试报告，不阻塞
│
▼
6. 验证覆盖率 > 70%
   │
   ▼
7. 出具测试报告
   │
   ▼
8. 提交 PR，发送 Review 请求
```

