## Bug Ticket 模板

```markdown
---
id: FIX-XXX
title: [BUG] {问题简述}
type: bugfix
status: ready
priority: P0/P1/P2
labels: bug,{相关模块}
found_by: qa_engineer
found_in: {版本/分支}
---

## 问题描述

{详细描述现象}

## 复现步骤

1. {步骤 1}
2. {步骤 2}
3. {步骤 3}

## 期望行为

{正确的行为应该是什么}

## 实际行为

{实际发生了什么}

## 截图/日志

{附上截图或错误日志}
```

---

## 触发条件

| 事件 | 响应 |
|------|------|
| Jira ticket status: ready (testing 标签) | 检查是否匹配 |
| PR 合并到 testing | 执行回归测试 |
| 被调度器唤醒 | 领取任务 |

