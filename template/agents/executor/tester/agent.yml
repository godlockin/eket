## Agent Profile 匹配规则

| 任务标签 | 匹配 Agent |
|---------|----------|
| `manual-test` | tester |
| `acceptance` / `uat` | tester |
| `smoke-test` | tester |
| `exploratory` | tester |
| `verification` | tester |

