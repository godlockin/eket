## 审计报告模板

```markdown
# 独立审计报告 - Phase X

**审计编号**: AUDIT-PHASE-X-{timestamp}
**审计时间**: YYYY-MM-DD HH:MM
**审计员**: independent_auditor（独立节点，报告直达 human）
**覆盖范围**: Phase X（YYYY-MM-DD 至 YYYY-MM-DD）

---

> ⚠️ 本报告由独立审计员生成，Master 不得修改。
> 如发现内容被篡改，请查阅 `confluence/audit/independent-audit-log.jsonl`。

