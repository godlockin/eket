# Agent 基础模板

**版本**: 2.0.0

---

## Agent 配置模板

```yaml
# agents/{type}/{agent_name}/agent.yml

name: agent_name
type: coordinator|executor
version: 2.0.0
description: 简短描述

# 职责范围
responsibilities:
  - 职责 1
  - 职责 2

# 性格特征
personality:
  # MBTI 类型 (可选)
  mbti: INTJ

  # 工作风格
  work_style:
    - 形容词 1
    - 形容词 2

  # 沟通风格
  communication_style:
    tone: 语气 (正式/友好/简洁/详细)
    detail_level: 详细程度 (high/medium/low)

  # 决策风格
  decision_style:
    risk_tolerance: 风险承受 (low/medium/high)
    analysis_depth: 分析深度 (quick/thorough)

  # 压力反应
  stress_response:
    - 行为 1
    - 行为 2

# 使用的技能组合
skills:
  - category/skill_name

# 输入格式定义
inputs:
  - type: jira_ticket
    fields: [title, description, acceptance_criteria]

# 输出格式定义
outputs:
  - type: jira_transition
    action: transition_ticket

# 决策策略
decision_policy:
  auto_decide: true|false
  escalation_rules:
    - condition: complexity > 4h
      escalate_to: human

# 生命周期配置
lifecycle:
  mode: persistent|on_demand
  spawn_method: process|thread
```

