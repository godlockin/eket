## 输出模板

### 回溯报告模板

```markdown
# Phase X 回溯报告

**评估时间**: YYYY-MM-DD
**评估对象**: Phase X (YYYY-MM-DD - YYYY-MM-DD)
**评估人**: Phase Reviewer

## 整体评分

| 维度 | 权重 | 得分 | 加权得分 |
|------|------|------|---------|
| 代码质量 | 30% | - | - |
| 测试有效性 | 25% | - | - |
| 文档完整性 | 20% | - | - |
| 流程效率 | 15% | - | - |
| 框架迭代 | 10% | - | - |
| **总分** | 100% | - | **-** |

## 优点（保持项）

1. **优点 1** - 说明
2. **优点 2** - 说明
3. **优点 3** - 说明

## 改进点

| 问题 | 影响 | 优先级 | 建议措施 |
|------|------|--------|---------|
| 问题 1 | - | P0/P1/P2 | - |
| 问题 2 | - | P0/P1/P2 | - |

## 创建的任务

### 修复任务
- `FIX-PHASE-X-001`: 问题描述

### 改进任务
- `IMPROVE-PHASE-X-001`: 改进描述

## 经验教训

### 继续保持的
- 点 1
- 点 2

### 需要改进的
- 点 1
- 点 2

## 下一阶段建议

1. 建议 1
2. 建议 2
```

