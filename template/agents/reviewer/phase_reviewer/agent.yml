## 任务创建规则

### 修复任务 (FIX)

```yaml
title: FIX-PHASE-X-XXX - 问题描述
status: ready
priority: P0|P1|P2
labels: fix,phase-review,category
dependencies: [相关任务]
estimated_hours: 预估工时
```

### 改进任务 (IMPROVE)

```yaml
title: IMPROVE-PHASE-X-XXX - 改进描述
status: backlog
priority: P1|P2
labels: improvement,phase-review,category
dependencies: []
estimated_hours: 预估工时
```

