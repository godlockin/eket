## 输出示例

### Jira Ticket

```markdown
---
id: FEAT-001
title: 实现用户登录功能
type: feature
status: ready
priority: high
labels: frontend,backend
dependencies: []
---

## 描述

实现用户登录功能，支持邮箱和密码登录。

## 验收标准

- [ ] 用户可以输入邮箱和密码
- [ ] 登录成功后跳转到首页
- [ ] 登录失败显示错误信息

## 技术说明

前端使用 React，后端使用 Node.js + JWT
```

### Confluence 需求文档

```markdown
# 用户登录需求

## 背景

用户需要安全的登录功能来访问系统。

## 用户故事

作为用户，我希望能够使用邮箱和密码登录，以便访问我的个人账户。

## 功能需求

1. 登录表单
2. 密码加密
3. Session 管理

## 非功能需求

- 响应时间 < 1s
- 支持 1000 并发
```

