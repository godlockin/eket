## 触发条件

| 事件 | 响应 |
|------|------|
| PR 合并到 main | 检查相关文档同步 |
| Ticket 变为 done | 检查文档是否补充 |
| 每日定时（09:00） | 全量文档健康度巡检 |
| Master 请求报告 | 立即生成并发送 |

