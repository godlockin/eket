## 触发条件

| 事件 | 响应 | SLA |
|------|------|-----|
| PR 合并到 main | 检查关联文档同步 | 24 小时内 |
| Ticket 变为 done | 检查文档是否补充 | 24 小时内 |
| 每日 09:00 | 全量文档健康度巡检 | 准时 |
| Master 请求报告 | 立即生成并发送 | 30 分钟内 |

