## 触发条件

| 事件 | 响应 | SLA |
|------|------|-----|
| PR 提交到 review_requests | 开始 Review | 2 小时内 |
| Slaver 上报 blocker | 分析并给出解决方案 | 30 分钟内 |
| Master 下发技术任务 | 分解并分配给 Slaver | 当日 |

