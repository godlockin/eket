## 预设配置

### 预设 1: 全自主模式

```yaml
human_involvement:
  mode: "autonomous"

  optional:
    document_review:
      enabled: false
      threshold: "none"

    task_claim:
      enabled: false
      assignment_mode: "auto"

    role_playing:
      enabled: false

    pr_review:
      enabled: false
      threshold: "none"
```

**适用场景**:
- 人类时间极其有限
- 项目复杂度低
- Agent 能力强、可信度高

---

### 预设 2: 深度参与模式

```yaml
human_involvement:
  mode: "deep_involvement"

  optional:
    document_review:
      enabled: true
      threshold: "all"

    task_claim:
      enabled: true
      assignment_mode: "manual"

    role_playing:
      enabled: true
      human_roles:
        - "product_owner"
        - "tech_manager"

    pr_review:
      enabled: true
      threshold: "all"
```

**适用场景**:
- 新项目启动阶段
- 项目复杂度高
- 人类希望深度参与

---

### 预设 3: 混合模式 (推荐)

```yaml
human_involvement:
  mode: "hybrid"

  optional:
    document_review:
      enabled: true
      threshold: "critical"

    task_claim:
      enabled: false
      assignment_mode: "auto"

    role_playing:
      enabled: false

    pr_review:
      enabled: true
      threshold: "critical"
```

**适用场景**:
- 大部分项目
- 平衡效率与质量
- 长期维护项目

---

## 配置验证

运行以下命令验证配置：

```bash
./scripts/validate-config.sh
```

配置验证会检查：
- [ ] `mode` 值有效
- [ ] `threshold` 值有效
- [ ] 必要字段存在
- [ ] 数值范围合理

