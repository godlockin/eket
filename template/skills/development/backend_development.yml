# Skill: Backend Development

**Category**: development
**Version**: 1.0.0

---

## Description

根据 API 设计和数据库设计实现后端服务代码。

## Inputs

| Name | Type | Required | Description |
|------|------|----------|-------------|
| api_spec | object | true | API 接口定义 |
| database_schema | object | false | 数据库 Schema 设计 |
| tech_stack | array | true | 技术栈选择 |

## Outputs

| Name | Type | Description |
|------|------|-------------|
| backend_code | file | 生成的后端代码 |
| api_docs | file | API 文档 |
| test_cases | file | 测试用例 |

## Steps

1. **设置项目结构** - 创建目录和配置文件
2. **实现数据模型** - 根据 Schema 创建 Models
3. **实现 API 端点** - 根据 API spec 创建 Controllers
4. **实现业务逻辑** - 编写 Services 层代码
5. **编写单元测试** - 为核心功能编写测试
6. **生成 API 文档** - 自动生成 OpenAPI 文档

## Example

```yaml
inputs:
  api_spec:
    endpoints:
      - path: /api/login
        method: POST
        body: { username: string, password: string }
  database_schema:
    tables:
      - name: users
        columns: [id, username, email, password_hash]
  tech_stack: [nodejs, express, postgresql]

outputs:
  backend_code: "src/controllers/auth.controller.js..."
  api_docs: "docs/api.yaml"
  test_cases: "tests/unit/auth.test.js"
```
