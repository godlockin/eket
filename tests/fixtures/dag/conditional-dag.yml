# TASK-641: Conditional DAG Fixture
# Tests gate nodes and conditional execution paths

version: "1.0"
epic: EPIC-017

nodes:
  - id: TASK-001
    script: "echo 'Starting pipeline'"
    deps: []

  - id: gate-env-check
    type: gate
    condition: "test -n \"$CI\" && exit 0 || exit 1"
    deps: [TASK-001]
    description: "Check if running in CI environment"

  - id: ci-deploy
    script: "echo 'Deploying to CI environment'"
    deps: [gate-env-check]
    when: "gate-env-check.success"

  - id: local-test
    script: "echo 'Running local tests only'"
    deps: [gate-env-check]
    when: "gate-env-check.failure"

  - id: TASK-002
    script: "echo 'Pipeline complete'"
    deps: [ci-deploy, local-test]

settings:
  max_parallel: 2
  on_failure: stop
