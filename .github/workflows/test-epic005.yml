name: Test EPIC-005

on:
  workflow_dispatch:

jobs:
  build-binary:
    name: Build Rust (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: eket-rust-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: eket-rust-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: eket-rust-darwin-amd64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cd rust && cargo build --release --target ${{ matrix.target }}
      - run: cp rust/target/${{ matrix.target }}/release/eket ${{ matrix.artifact }}
      - run: chmod +x ${{ matrix.artifact }} && ./${{ matrix.artifact }} --version
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
