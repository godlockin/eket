name: Branch Drift Alert

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch drift
        id: drift
        run: |
          bash scripts/check-branch-drift.sh | tee drift-report.txt
        continue-on-error: true

      - name: Create issue if drift exceeded
        if: steps.drift.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('drift-report.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Branch drift alert — ${new Date().toISOString().slice(0,10)}`,
              body: `## Branch Drift Threshold Exceeded\n\n\`\`\`\n${report}\n\`\`\`\n\n**Action required**: Sync branches to reduce drift.\n\nSee \`scripts/check-branch-drift.sh\` for thresholds.`,
              labels: ['branch-drift-alert']
            });
