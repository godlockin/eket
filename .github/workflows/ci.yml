name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - testing
      - miao

jobs:
  # ============================================================
  # Job 1: Node.js — Build / Test / Lint / Audit
  # ============================================================
  node:
    name: Node.js (build / test / lint / audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: node/package-lock.json

      - name: Install dependencies
        run: cd node && npm ci

      - name: Build (tsc)
        run: cd node && npm run build

      - name: Test (jest)
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: cd node && npm test

      - name: Lint (eslint) — hard gate
        run: cd node && npm run lint

      - name: Security audit (npm audit)
        run: cd node && npm audit --audit-level=moderate

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-results
          path: node/test-results/
          retention-days: 7

  # ============================================================
  # Job 2: Shell — shellcheck + syntax check
  # ============================================================
  shell:
    name: Shell (shellcheck / syntax)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Syntax check (bash -n)
        run: |
          find scripts/ tests/ -name "*.sh" | while read -r f; do
            bash -n "$f" || { echo "SYNTAX ERROR: $f"; exit 1; }
          done
          echo "All shell scripts pass syntax check"

      - name: shellcheck (static analysis)
        run: |
          find scripts/ tests/ -name "*.sh" \
            | xargs shellcheck \
                --severity=error \
                --exclude=SC1091,SC2034,SC2086,SC2155,SC2164,SC2046,SC2206,SC2207,SC2144,SC2199,SC2168

  # ============================================================
  # Job 3: Python SDK — pytest / mypy / ruff / pip-audit
  # ============================================================
  python:
    name: Python SDK (test / type-check / lint / audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sdk/python/requirements.txt

      - name: Install dependencies
        run: pip install -e ".[dev]" ruff pip-audit

      - name: Test (pytest)
        run: pytest -v --tb=short

      - name: Type check (mypy)
        run: mypy eket_sdk/

      - name: Lint (ruff)
        run: ruff check eket_sdk/ tests/

      - name: Security audit (pip-audit)
        run: pip-audit --desc

  # ============================================================
  # Job 4: Dual-Engine Equivalence (Shell vs Node writer)
  # ============================================================
  dual-engine-equivalence:
    name: Dual-Engine Equivalence (Shell ≡ Node)
    runs-on: ubuntu-latest
    needs: [node, shell]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: node/package-lock.json

      - name: Install jq (dual-engine hard dep)
        run: sudo apt-get install -y jq

      - name: Install Node deps + build
        run: cd node && npm ci && npm run build

      - name: Shell preflight check
        run: bash -c 'source lib/state/preflight.sh && state_preflight_deps'

      - name: Run dual-engine equivalence suite (--ci)
        run: bash tests/dual-engine/run-all.sh --ci
