name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - testing
      - miao

jobs:
  # ============================================================
  # Job 1: Node.js — Build / Test / Lint / Audit
  # ============================================================
  node:
    name: Node.js ${{ matrix.node-version }} (build / test / lint / audit)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '24']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: node/package-lock.json

      - name: Install dependencies
        run: cd node && npm ci

      - name: Build (tsc)
        run: cd node && npm run build

      - name: Test (jest)
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: cd node && npm test

      - name: Lint (eslint) — hard gate
        run: cd node && npm run lint

      - name: Security audit (npm audit)
        run: cd node && npm audit --audit-level=moderate

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-results-${{ matrix.node-version }}
          path: node/test-results/
          retention-days: 7

  # ============================================================
  # Job 2: Shell — shellcheck + syntax check
  # ============================================================
  shell:
    name: Shell (shellcheck / syntax)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Syntax check (bash -n)
        run: |
          find scripts/ tests/ -name "*.sh" | while read -r f; do
            bash -n "$f" || { echo "SYNTAX ERROR: $f"; exit 1; }
          done
          echo "All shell scripts pass syntax check"

      - name: shellcheck (static analysis)
        run: |
          find scripts/ tests/ -name "*.sh" \
            | xargs shellcheck \
                --severity=error \
                --exclude=SC1091,SC2034,SC2086,SC2155,SC2164,SC2046,SC2206,SC2207,SC2144,SC2199,SC2168

  # ============================================================
  # Job 3: Python SDK — pytest / mypy / ruff / pip-audit
  # ============================================================
  python:
    name: Python SDK (test / type-check / lint / audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sdk/python/requirements.txt

      - name: Install dependencies
        run: pip install -e ".[dev]" ruff pip-audit

      - name: Test (pytest)
        run: pytest -v --tb=short

      - name: Type check (mypy)
        run: mypy eket_sdk/

      - name: Lint (ruff)
        run: ruff check eket_sdk/ tests/

      - name: Security audit (pip-audit)
        run: pip-audit --desc

  # ============================================================
  # Job 4: JavaScript SDK — build / test
  # ============================================================
  js-sdk:
    name: JavaScript SDK (build / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/javascript

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/javascript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

      - name: Test (jest)
        run: npm test

  # ============================================================
  # Job 5: Rust — check / test / clippy
  # ============================================================
  rust:
    name: Rust (check / test / clippy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Check
        run: cd rust && cargo check

      - name: Test
        run: cd rust && cargo test

      - name: Clippy
        run: cd rust && cargo clippy -- -D warnings
