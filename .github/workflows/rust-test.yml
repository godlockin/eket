name: Rust Context Monitor - Test

on:
  push:
    branches: [main, testing, feature/**]
    paths:
      - 'rust/crates/context-mon/**'
      - '.github/workflows/rust-test.yml'
  pull_request:
    paths:
      - 'rust/crates/context-mon/**'
      - '.github/workflows/rust-test.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/crates/context-mon

      - name: Run tests
        working-directory: rust/crates/context-mon
        run: cargo test --verbose

      - name: Run clippy
        working-directory: rust/crates/context-mon
        run: cargo clippy -- -D warnings

      - name: Check formatting
        working-directory: rust/crates/context-mon
        run: cargo fmt -- --check

  benchmark:
    name: Benchmark (macOS only)
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/crates/context-mon

      - name: Run benchmarks
        working-directory: rust/crates/context-mon
        run: cargo bench --bench startup

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: rust/crates/context-mon/target/criterion/
          retention-days: 30
