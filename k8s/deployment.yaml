# ==============================================================================
# EKET Framework - Kubernetes Master Deployment
# 单副本，带 PVC 持久化存储
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: eket-master
  labels:
    app: eket
    role: master
    version: "2.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eket
      role: master
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: eket
        role: master
        version: "2.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8899"
        prometheus.io/path: "/health"
    spec:
      # 安全上下文
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      # 服务账户（可选，用于访问 K8s API）
      serviceAccountName: eket-master

      # 容器定义
      containers:
        - name: eket-master
          image: eket-cli:2.0.0
          imagePullPolicy: IfNotPresent

          # 命令和参数
          command: ["node"]
          args:
            - "dist/index.js"
            - "hooks:start"
            - "--port"
            - "8899"
            - "--host"
            - "0.0.0.0"

          # 端口暴露
          ports:
            - name: http-hooks
              containerPort: 8899
              protocol: TCP
            - name: health
              containerPort: 8899
              protocol: TCP

          # 环境变量
          env:
            # 从 ConfigMap 加载
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: NODE_ENV
            - name: EKET_SQLITE_PATH
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_SQLITE_PATH
            - name: EKET_FILE_QUEUE_DIR
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_FILE_QUEUE_DIR
            - name: EKET_LOG_DIR
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_LOG_DIR
            - name: EKET_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_LOG_LEVEL
            - name: EKET_DRIVER_MODE
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_DRIVER_MODE

            # 从 Secret 加载
            - name: EKET_HOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: eket-secret
                  key: EKET_HOOK_SECRET
            - name: EKET_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eket-secret
                  key: EKET_REDIS_PASSWORD
                  optional: true

            # Redis 配置（可选）
            - name: EKET_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_REDIS_HOST
                  optional: true
            - name: EKET_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_REDIS_PORT
                  optional: true

          # 资源限制
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # 健康检查
          livenessProbe:
            httpGet:
              path: /health
              port: 8899
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health
              port: 8899
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /health
              port: 8899
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          # 文件挂载
          volumeMounts:
            - name: data
              mountPath: /app/data
              subPath: data
            - name: logs
              mountPath: /app/logs
              subPath: logs

          # 安全上下文
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      # 卷定义
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: eket-data-pvc
        - name: logs
          emptyDir: {}

      # DNS 配置
      dnsPolicy: ClusterFirst

      # 节点选择（可选）
      # nodeSelector:
      #   node-type: backend

      # 容忍度（可选）
      # tolerations:
      #   - key: "node-role.kubernetes.io/master"
      #     operator: "Exists"
      #     effect: "NoSchedule"

      # 亲和性（可选）
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - eket
                topologyKey: kubernetes.io/hostname

---
# ==============================================================================
# EKET Framework - Kubernetes Slaver Deployment
# 多副本，无状态
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: eket-slaver
  labels:
    app: eket
    role: slaver
    version: "2.0.0"
spec:
  # 副本数，可根据负载调整
  replicas: 3
  selector:
    matchLabels:
      app: eket
      role: slaver
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: eket
        role: slaver
        version: "2.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8899"
        prometheus.io/path: "/health"
    spec:
      # 安全上下文
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      # 容器定义
      containers:
        - name: eket-slaver
          image: eket-cli:2.0.0
          imagePullPolicy: IfNotPresent

          # 命令和参数
          command: ["node"]
          args:
            - "dist/index.js"
            - "start:instance"
            - "--auto"

          # 端口暴露
          ports:
            - name: health
              containerPort: 8899
              protocol: TCP

          # 环境变量
          env:
            # 从 ConfigMap 加载
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: NODE_ENV
            - name: EKET_SQLITE_PATH
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_SQLITE_PATH
            - name: EKET_LOG_DIR
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_LOG_DIR
            - name: EKET_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_LOG_LEVEL
            - name: EKET_DRIVER_MODE
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_DRIVER_MODE
            - name: EKET_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_REDIS_HOST
            - name: EKET_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: eket-config
                  key: EKET_REDIS_PORT

            # 从 Secret 加载
            - name: EKET_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eket-secret
                  key: EKET_REDIS_PASSWORD
                  optional: true

          # 资源限制
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # 健康检查
          livenessProbe:
            httpGet:
              path: /health
              port: 8899
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8899
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: 8899
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          # 文件挂载
          volumeMounts:
            - name: logs
              mountPath: /app/logs

          # 安全上下文
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      # 卷定义
      volumes:
        - name: logs
          emptyDir: {}

      # DNS 配置
      dnsPolicy: ClusterFirst

      # 亲和性
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - eket
                topologyKey: kubernetes.io/hostname

---
# ==============================================================================
# EKET Framework - Kubernetes Service
# ClusterIP 服务，内部访问
# ==============================================================================

apiVersion: v1
kind: Service
metadata:
  name: eket-master
  labels:
    app: eket
    role: master
    version: "2.0.0"
spec:
  type: ClusterIP
  ports:
    - name: http-hooks
      port: 8899
      targetPort: 8899
      protocol: TCP
    - name: health
      port: 8898
      targetPort: 8899
      protocol: TCP
  selector:
    app: eket
    role: master

---
apiVersion: v1
kind: Service
metadata:
  name: eket-slaver
  labels:
    app: eket
    role: slaver
    version: "2.0.0"
spec:
  type: ClusterIP
  clusterIP: None  # Headless Service，用于服务发现
  ports:
    - name: health
      port: 8899
      targetPort: 8899
      protocol: TCP
  selector:
    app: eket
    role: slaver

---
# ==============================================================================
# EKET Framework - Kubernetes ServiceAccount
# 用于 Master 访问 K8s API（可选）
# ==============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: eket-master
  labels:
    app: eket
    version: "2.0.0"
automountServiceAccountToken: false

---
# ==============================================================================
# EKET Framework - Kubernetes HorizontalPodAutoscaler
# 自动扩缩容配置（可选）
# ==============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eket-slaver-hpa
  labels:
    app: eket
    version: "2.0.0"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eket-slaver
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
