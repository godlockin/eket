                - blockquote [ref=e1446]:
                  - paragraph [ref=e1447]: Messages without a command prefix are treated as regular chat — DeerFlow creates a thread and responds conversationally.
                - generic [ref=e1448]:
                  - heading "LangSmith Tracing" [level=4] [ref=e1449]
