                - paragraph [ref=e1718]:
                  - text: Regression coverage includes Docker sandbox mode detection and provisioner kubeconfig-path handling tests in
                  - code [ref=e1719]: backend/tests/
                  - text: . Gateway artifact serving now forces active web content types (
                  - code [ref=e1720]: text/html
                  - text: ","
