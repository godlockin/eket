                  - text: command in Claude Code.
                - paragraph [ref=e1553]:
                  - strong [ref=e1554]: What you can do
                  - text: ":"
                - list [ref=e1555]:
                  - listitem [ref=e1556]: Send messages to DeerFlow and get streaming responses
                  - listitem [ref=e1557]: "Choose execution modes: flash (fast), standard, pro (planning), ultra (sub-agents)"
                  - listitem [ref=e1558]: Check DeerFlow health, list models/skills/agents
                  - listitem [ref=e1559]: Manage threads and conversation history
