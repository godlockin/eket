                  - button "Copy" [ref=e1569] [cursor=pointer]:
                    - img [ref=e1570]
                - paragraph [ref=e1573]:
                  - text: See
                  - link "skills/public/claude-to-deerflow/SKILL.md" [ref=e1574] [cursor=pointer]:
                    - /url: /bytedance/deer-flow/blob/main/skills/public/claude-to-deerflow/SKILL.md
                    - code [ref=e1575]: skills/public/claude-to-deerflow/SKILL.md
                  - text: for the full API reference.
                - generic [ref=e1576]:
                  - heading "Sub-Agents" [level=3] [ref=e1577]
                  - 'link "Permalink: Sub-Agents" [ref=e1578] [cursor=pointer]':
                    - /url: "#sub-agents"
                    - img [ref=e1579]
                - paragraph [ref=e1581]: Complex tasks rarely fit in a single pass. DeerFlow decomposes them.
                - paragraph [ref=e1582]: The lead agent can spawn sub-agents on the fly — each with its own scoped context, tools, and termination conditions. Sub-agents run in parallel when possible, report back structured results, and the lead agent synthesizes everything into a coherent output.
                - paragraph [ref=e1583]: "This is how DeerFlow handles tasks that take minutes to hours: a research task might fan out into a dozen sub-agents, each exploring a different angle, then converge into a single report — or a website — or a slide deck with generated visuals. One harness, many hands."
                - generic [ref=e1584]:
                  - heading "Sandbox & File System" [level=3] [ref=e1585]
                  - 'link "Permalink: Sandbox & File System" [ref=e1586] [cursor=pointer]':
                    - /url: "#sandbox--file-system"
                    - img [ref=e1587]
                - paragraph [ref=e1589]:
                  - text: DeerFlow doesn't just
                  - emphasis [ref=e1590]: talk
                  - text: about doing things. It has its own computer.
                - paragraph [ref=e1591]: Each task gets its own execution environment with a full filesystem view — skills, workspace, uploads, outputs. The agent reads, writes, and edits files. It can view images and, when configured safely, execute shell commands.
                - paragraph [ref=e1592]:
                  - text: With
                  - code [ref=e1593]: AioSandboxProvider
                  - text: ", shell execution runs inside isolated containers. With"
                  - code [ref=e1594]: LocalSandboxProvider
                  - text: ", file tools still map to per-thread directories on the host, but host"
                  - code [ref=e1595]: bash
                  - text: is disabled by default because it is not a secure isolation boundary. Re-enable host bash only for fully trusted local workflows.
                - paragraph [ref=e1596]: This is the difference between a chatbot with tool access and an agent with an actual execution environment.
                - generic [ref=e1597]:
                  - code [ref=e1599]: "# Paths inside the sandbox container /mnt/user-data/ ├── uploads/ ← your files ├── workspace/ ← agents' working directory └── outputs/ ← final deliverables"
                  - button "Copy" [ref=e1601] [cursor=pointer]:
                    - img [ref=e1602]
                - generic [ref=e1605]:
                  - heading "Context Engineering" [level=3] [ref=e1606]
                  - 'link "Permalink: Context Engineering" [ref=e1607] [cursor=pointer]':
                    - /url: "#context-engineering"
                    - img [ref=e1608]
                - paragraph [ref=e1610]:
                  - strong [ref=e1611]: Isolated Sub-Agent Context
                  - text: ": Each sub-agent runs in its own isolated context. This means that the sub-agent will not be able to see the context of the main agent or other sub-agents. This is important to ensure that the sub-agent is able to focus on the task at hand and not be distracted by the context of the main agent or other sub-agents."
                - paragraph [ref=e1612]:
                  - strong [ref=e1613]: Summarization
                  - text: ": Within a session, DeerFlow manages context aggressively — summarizing completed sub-tasks, offloading intermediate results to the filesystem, compressing what's no longer immediately relevant. This lets it stay sharp across long, multi-step tasks without blowing the context window."
                - paragraph [ref=e1614]:
                  - strong [ref=e1615]: Strict Tool-Call Recovery
                  - text: ": When a provider or middleware interrupts a tool-call loop, DeerFlow now strips provider-level raw tool-call metadata on forced-stop assistant messages and injects placeholder tool results for dangling calls before the next model invocation. This keeps OpenAI-compatible reasoning models that strictly validate"
                  - code [ref=e1616]: tool_call_id
                  - text: sequences from failing with malformed history errors.
                - generic [ref=e1617]:
                  - heading "Long-Term Memory" [level=3] [ref=e1618]
                  - 'link "Permalink: Long-Term Memory" [ref=e1619] [cursor=pointer]':
                    - /url: "#long-term-memory"
                    - img [ref=e1620]
                - paragraph [ref=e1622]: Most agents forget everything the moment a conversation ends. DeerFlow remembers.
                - paragraph [ref=e1623]: Across sessions, DeerFlow builds a persistent memory of your profile, preferences, and accumulated knowledge. The more you use it, the better it knows you — your writing style, your technical stack, your recurring workflows. Memory is stored locally and stays under your control.
                - paragraph [ref=e1624]: Memory updates now skip duplicate fact entries at apply time, so repeated preferences and context do not accumulate endlessly across sessions.
                - generic [ref=e1625]:
                  - heading "Recommended Models" [level=2] [ref=e1626]
                  - 'link "Permalink: Recommended Models" [ref=e1627] [cursor=pointer]':
                    - /url: "#recommended-models"
                    - img [ref=e1628]
                - paragraph [ref=e1630]: "DeerFlow is model-agnostic — it works with any LLM that implements the OpenAI-compatible API. That said, it performs best with models that support:"
                - list [ref=e1631]:
                  - listitem [ref=e1632]:
                    - strong [ref=e1633]: Long context windows
                    - text: (100k+ tokens) for deep research and multi-step tasks
                  - listitem [ref=e1634]:
                    - strong [ref=e1635]: Reasoning capabilities
                    - text: for adaptive planning and complex decomposition
                  - listitem [ref=e1636]:
                    - strong [ref=e1637]: Multimodal inputs
                    - text: for image understanding and video comprehension
                  - listitem [ref=e1638]:
                    - strong [ref=e1639]: Strong tool-use
                    - text: for reliable function calling and structured outputs
                - generic [ref=e1640]:
                  - heading "Embedded Python Client" [level=2] [ref=e1641]
                  - 'link "Permalink: Embedded Python Client" [ref=e1642] [cursor=pointer]':
                    - /url: "#embedded-python-client"
                    - img [ref=e1643]
                - paragraph [ref=e1645]:
                  - text: DeerFlow can be used as an embedded Python library without running the full HTTP services. The
                  - code [ref=e1646]: DeerFlowClient
                  - text: provides direct in-process access to all agent and Gateway capabilities, returning the same response schemas as the HTTP Gateway API. The HTTP Gateway also exposes
                  - code [ref=e1647]: "DELETE /api/threads/{thread_id}"
                  - text: "to remove DeerFlow-managed local thread data after the LangGraph thread itself has been deleted:"
                - generic [ref=e1648]:
                  - generic [ref=e1649]: "from deerflow.client import DeerFlowClient client = DeerFlowClient() # Chat response = client.chat(\"Analyze this paper for me\", thread_id=\"my-thread\") # Streaming (LangGraph SSE protocol: values, messages-tuple, end) for event in client.stream(\"hello\"): if event.type == \"messages-tuple\" and event.data.get(\"type\") == \"ai\": print(event.data[\"content\"]) # Configuration & management — returns Gateway-aligned dicts models = client.list_models() # {\"models\": [...]} skills = client.list_skills() # {\"skills\": [...]} client.update_skill(\"web-search\", enabled=True) client.upload_files(\"thread-1\", [\"./report.pdf\"]) # {\"success\": True, \"files\": [...]}"
                  - button "Copy" [ref=e1651] [cursor=pointer]:
                    - img [ref=e1652]
                - paragraph [ref=e1655]:
                  - text: All dict-returning methods are validated against Gateway Pydantic response models in CI (
                  - code [ref=e1656]: TestGatewayConformance
                  - text: ), ensuring the embedded client stays in sync with the HTTP API schemas. See
                  - code [ref=e1657]: backend/packages/harness/deerflow/client.py
                  - text: for full API documentation.
