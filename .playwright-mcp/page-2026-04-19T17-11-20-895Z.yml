                - generic [ref=e1678]:
                  - heading "Improper Deployment May Introduce Security Risks" [level=3] [ref=e1679]
                  - 'link "Permalink: Improper Deployment May Introduce Security Risks" [ref=e1680] [cursor=pointer]':
                    - /url: "#improper-deployment-may-introduce-security-risks"
                    - img [ref=e1681]
                - paragraph [ref=e1683]:
                  - text: DeerFlow has key high-privilege capabilities including
                  - strong [ref=e1684]: system command execution, resource operations, and business logic invocation
                  - text: ", and is designed by default to be"
                  - strong [ref=e1685]: deployed in a local trusted environment (accessible only via the 127.0.0.1 loopback interface)
                  - text: ". If you deploy the agent in untrusted environments — such as LAN networks, public cloud servers, or other multi-endpoint accessible environments — without strict security measures, it may introduce security risks, including:"
                - list [ref=e1686]:
                  - listitem [ref=e1687]:
                    - strong [ref=e1688]: Unauthorized illegal invocation
                    - text: ": Agent functionality could be discovered by unauthorized third parties or malicious internet scanners, triggering bulk unauthorized requests that execute high-risk operations such as system commands and file read/write, potentially causing serious security consequences."
                  - listitem [ref=e1689]:
                    - strong [ref=e1690]: Compliance and legal risks
                    - text: ": If the agent is illegally invoked to conduct cyberattacks, data theft, or other illegal activities, it may result in legal liability and compliance risks."
                - generic [ref=e1691]:
                  - heading "Security Recommendations" [level=3] [ref=e1692]
                  - 'link "Permalink: Security Recommendations" [ref=e1693] [cursor=pointer]':
                    - /url: "#security-recommendations"
                    - img [ref=e1694]
                - paragraph [ref=e1696]:
                  - strong [ref=e1697]: "Note: We strongly recommend deploying DeerFlow in a local trusted network environment."
                  - text: "If you need cross-device or cross-network deployment, you must implement strict security measures, such as:"
                - list [ref=e1698]:
                  - listitem [ref=e1699]:
                    - strong [ref=e1700]: IP allowlist
                    - text: ": Use"
                    - code [ref=e1701]: iptables
                    - text: ", or deploy hardware firewalls / switches with Access Control Lists (ACL), to"
                    - strong [ref=e1702]: configure IP allowlist rules
                    - text: and deny access from all other IP addresses.
                  - listitem [ref=e1703]:
                    - strong [ref=e1704]: Authentication gateway
                    - text: ": Configure a reverse proxy (e.g., nginx) and"
                    - strong [ref=e1705]: enable strong pre-authentication
                    - text: ", blocking any unauthenticated access."
                  - listitem [ref=e1706]:
                    - strong [ref=e1707]: Network isolation
                    - text: ": Where possible, place the agent and trusted devices in the"
                    - strong [ref=e1708]: same dedicated VLAN
                    - text: ", isolated from other network devices."
                  - listitem [ref=e1709]:
                    - strong [ref=e1710]: Stay updated
                    - text: ": Continue to follow DeerFlow's security feature updates."
                - generic [ref=e1711]:
                  - heading "Contributing" [level=2] [ref=e1712]
                  - 'link "Permalink: Contributing" [ref=e1713] [cursor=pointer]':
                    - /url: "#contributing"
                    - img [ref=e1714]
                - paragraph [ref=e1716]:
                  - text: We welcome contributions! Please see
                  - link "CONTRIBUTING.md" [ref=e1717] [cursor=pointer]:
