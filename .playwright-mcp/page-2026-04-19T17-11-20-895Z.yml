                - generic [ref=e1493]:
                  - heading "From Deep Research to Super Agent Harness" [level=2] [ref=e1494]
                  - 'link "Permalink: From Deep Research to Super Agent Harness" [ref=e1495] [cursor=pointer]':
                    - /url: "#from-deep-research-to-super-agent-harness"
                    - img [ref=e1496]
                - paragraph [ref=e1498]: "DeerFlow started as a Deep Research framework — and the community ran with it. Since launch, developers have pushed it far beyond research: building data pipelines, generating slide decks, spinning up dashboards, automating content workflows. Things we never anticipated."
                - paragraph [ref=e1499]:
                  - text: "That told us something important: DeerFlow wasn't just a research tool. It was a"
                  - strong [ref=e1500]: harness
                  - text: — a runtime that gives agents the infrastructure to actually get work done.
                - paragraph [ref=e1501]: So we rebuilt it from scratch.
                - paragraph [ref=e1502]: "DeerFlow 2.0 is no longer a framework you wire together. It's a super agent harness — batteries included, fully extensible. Built on LangGraph and LangChain, it ships with everything an agent needs out of the box: a filesystem, memory, skills, sandbox-aware execution, and the ability to plan and spawn sub-agents for complex, multi-step tasks."
                - paragraph [ref=e1503]: Use it as-is. Or tear it apart and make it yours.
                - generic [ref=e1504]:
                  - heading "Core Features" [level=2] [ref=e1505]
                  - 'link "Permalink: Core Features" [ref=e1506] [cursor=pointer]':
                    - /url: "#core-features"
                    - img [ref=e1507]
                - generic [ref=e1509]:
                  - heading "Skills & Tools" [level=3] [ref=e1510]
                  - 'link "Permalink: Skills & Tools" [ref=e1511] [cursor=pointer]':
                    - /url: "#skills--tools"
                    - img [ref=e1512]
                - paragraph [ref=e1514]:
                  - text: Skills are what make DeerFlow do
                  - emphasis [ref=e1515]: almost anything
                  - text: .
                - paragraph [ref=e1516]: "A standard Agent Skill is a structured capability module — a Markdown file that defines a workflow, best practices, and references to supporting resources. DeerFlow ships with built-in skills for research, report generation, slide creation, web pages, image and video generation, and more. But the real power is extensibility: add your own skills, replace the built-in ones, or combine them into compound workflows."
                - paragraph [ref=e1517]: Skills are loaded progressively — only when the task needs them, not all at once. This keeps the context window lean and makes DeerFlow work well even with token-sensitive models.
                - paragraph [ref=e1518]:
                  - text: When you install
                  - code [ref=e1519]: .skill
                  - text: archives through the Gateway, DeerFlow accepts standard optional frontmatter metadata such as
                  - code [ref=e1520]: version
                  - text: ","
                  - code [ref=e1521]: author
                  - text: ", and"
                  - code [ref=e1522]: compatibility
                  - text: instead of rejecting otherwise valid external skills.
                - paragraph [ref=e1523]: Tools follow the same philosophy. DeerFlow comes with a core toolset — web search, web fetch, file operations, bash execution — and supports custom tools via MCP servers and Python functions. Swap anything. Add anything.
                - paragraph [ref=e1524]: Gateway-generated follow-up suggestions now normalize both plain-string model output and block/list-style rich content before parsing the JSON array response, so provider-specific content wrappers do not silently drop suggestions.
                - generic [ref=e1525]:
                  - code [ref=e1527]: "# Paths inside the sandbox container /mnt/skills/public ├── research/SKILL.md ├── report-generation/SKILL.md ├── slide-creation/SKILL.md ├── web-page/SKILL.md └── image-generation/SKILL.md /mnt/skills/custom └── your-custom-skill/SKILL.md ← yours"
                  - button "Copy" [ref=e1529] [cursor=pointer]:
                    - img [ref=e1530]
                - generic [ref=e1533]:
                  - heading "Claude Code Integration" [level=4] [ref=e1534]
                  - 'link "Permalink: Claude Code Integration" [ref=e1535] [cursor=pointer]':
                    - /url: "#claude-code-integration"
                    - img [ref=e1536]
                - paragraph [ref=e1538]:
                  - text: The
                  - code [ref=e1539]: claude-to-deerflow
                  - text: skill lets you interact with a running DeerFlow instance directly from
                  - link "Claude Code" [ref=e1540] [cursor=pointer]:
                    - /url: https://docs.anthropic.com/en/docs/claude-code
                  - text: . Send research tasks, check status, manage threads — all without leaving the terminal.
                - paragraph [ref=e1541]:
                  - strong [ref=e1542]: Install the skill
                  - text: ":"
                - generic [ref=e1543]:
