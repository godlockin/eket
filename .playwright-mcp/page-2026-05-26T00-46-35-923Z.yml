                - generic [ref=e327]:
                  - paragraph [ref=e330]:
                    - strong [ref=e331]: 大健康行业：
                    - text: 全民健康时代来临，诉求聚焦
                    - strong [ref=e332]: “即时”与“顺时”
                    - text: 两大趋势，关联养颜、食补、轻运动等多种养生方式。肠胃、失眠、疲劳等痛点逐渐扩大，推动
                    - strong [ref=e334]: 「肝脏养护、五官保养」
                    - text: 等新兴需求崛起。品牌可围绕便捷、时间与细分场景精准种草，抢占大健康赛道风口。
                  - paragraph [ref=e335]
