                - text: to generate images based on real-time information, such as weather forecasts, stock charts, or recent events.
              - paragraph [ref=e424]:
                - text: Note that when using Grounding with Google Search with image generation, image-based search results are not passed to the generation model and are excluded from the response (see
                - link "Grounding with Google Search for images" [ref=e425] [cursor=pointer]:
