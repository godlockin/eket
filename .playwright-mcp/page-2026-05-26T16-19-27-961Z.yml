                    - listitem [ref=e340]: "Or build your own from prompts:"
              - paragraph [ref=e341]:
                - strong [ref=e342]: Nano Banana
                - text: is the name for Gemini's native image generation capabilities. Gemini can generate and process images conversationally with text, images, or a combination of both. This lets you create, edit, and iterate on visuals with unprecedented control.
              - paragraph [ref=e343]: "Nano Banana refers to three distinct models available in the Gemini API:"
              - list [ref=e344]:
                - listitem [ref=e345]:
                  - strong [ref=e346]: Nano Banana 2
                  - text: ": The"
                  - link "Gemini 3.1 Flash Image Preview" [ref=e347] [cursor=pointer]:
                    - /url: /gemini-api/docs/models/gemini-3.1-flash-image-preview
                  - text: model (
                  - code [ref=e348]: gemini-3.1-flash-image-preview
                  - text: ). This model serves as the high-efficiency counterpart to Gemini 3 Pro Image, optimized for speed and high-volume developer use cases.
                - listitem [ref=e349]:
                  - strong [ref=e350]: Nano Banana Pro
                  - text: ": The"
                  - link "Gemini 3 Pro Image Preview" [ref=e351] [cursor=pointer]:
                    - /url: /gemini-api/docs/models/gemini-3-pro-image-preview
                  - text: model (
                  - code [ref=e352]: gemini-3-pro-image-preview
                  - text: ). This model is designed for professional asset production, utilizing advanced reasoning ("Thinking") to follow complex instructions and render high-fidelity text.
                - listitem [ref=e353]:
                  - strong [ref=e354]: Nano Banana
                  - text: ": The"
                  - link "Gemini 2.5 Flash Image" [ref=e355] [cursor=pointer]:
                    - /url: /gemini-api/docs/models/gemini-2.5-flash-image
                  - text: model (
                  - code [ref=e356]: gemini-2.5-flash-image
                  - text: ). This model is designed for speed and efficiency, optimized for high-volume, low-latency tasks.
              - paragraph [ref=e357]:
                - text: All generated images include a
                - link "SynthID watermark" [ref=e358] [cursor=pointer]:
                  - /url: /responsible/docs/safeguards/synthid
                - text: .
              - heading "Image generation (text-to-image)" [level=2] [ref=e359]
              - heading "Image editing (text-and-image-to-image)" [level=2] [ref=e361]
              - paragraph [ref=e362]:
                - strong [ref=e363]: Reminder
                - text: ": Make sure you have the necessary rights to any images you upload. Don't generate content that infringe on others' rights, including videos or images that deceive, harass, or harm. Your use of this generative AI service is subject to our"
                - link "Prohibited Use Policy" [ref=e364] [cursor=pointer]:
                  - /url: https://policies.google.com/terms/generative-ai/use-policy
                - text: .
              - paragraph [ref=e365]: Provide an image and use text prompts to add, remove, or modify elements, change the style, or adjust the color grading.
              - paragraph [ref=e366]:
                - text: The following example demonstrates uploading
                - code [ref=e367]: base64
                - text: encoded images. For multiple images, larger payloads, and supported MIME types, check the
                - link "Image understanding" [ref=e368] [cursor=pointer]:
                  - /url: /gemini-api/docs/image-understanding
                - text: page.
              - heading "Multi-turn image editing" [level=3] [ref=e370]
              - paragraph [ref=e371]: Keep generating and editing images conversationally. Chat or multi-turn conversation is the recommended way to iterate on images. The following example shows a prompt to generate an infographic about photosynthesis.
              - figure "AI-generated infographic about photosynthesis" [ref=e373]:
                - img "AI-generated infographic about photosynthesis" [ref=e374]
                - generic [ref=e375]: AI-generated infographic about photosynthesis
              - paragraph [ref=e376]: You can then use the same chat to change the language on the graphic to Spanish.
              - figure "AI-generated infographic of photosynthesis in Spanish" [ref=e378]:
                - img "AI-generated infographic of photosynthesis in Spanish" [ref=e379]
                - generic [ref=e380]: AI-generated infographic of photosynthesis in Spanish
              - heading "New with Gemini 3 Image models" [level=2] [ref=e381]
              - paragraph [ref=e382]: Gemini 3 offers state-of-the-art image generation and editing models. Gemini 3.1 Flash Image is optimized for speed and high-volume use-cases, and Gemini 3 Pro Image is optimized for professional asset production. Designed to tackle the most challenging workflows through advanced reasoning, they excel at complex, multi-turn creation and modification tasks.
              - list [ref=e383]:
                - listitem [ref=e384]:
                  - strong [ref=e385]: High-resolution output
                  - text: ": Built-in generation capabilities for 1K, 2K, and 4K visuals."
                  - list [ref=e386]:
                    - listitem [ref=e387]:
                      - strong [ref=e388]: Gemini 3.1 Flash Image
                      - text: adds the smaller 512 (0.5K) resolution.
                - listitem [ref=e389]:
                  - strong [ref=e390]: Advanced text rendering
                  - text: ": Capable of generating legible, stylized text for infographics, menus, diagrams, and marketing assets."
                - listitem [ref=e391]:
                  - strong [ref=e392]: Grounding with Google Search
                  - text: ": The model can use Google Search as a tool to verify facts and generate imagery based on real-time data (e.g., current weather maps, stock charts, recent events)."
                  - list [ref=e393]:
                    - listitem [ref=e394]:
                      - strong [ref=e395]: Gemini 3.1 Flash Image
                      - text: adds the integration of Grounding with Google Search for Images alongside Web Search.
                - listitem [ref=e396]:
                  - strong [ref=e397]: Thinking mode
                  - text: ": The model utilizes a \"thinking\" process to reason through complex prompts. It generates interim \"thought images\" (visible in the backend but not charged) to refine the composition before producing the final high-quality output."
                - listitem [ref=e398]:
                  - strong [ref=e399]: Up to 14 reference images
                  - text: ": You can now mix up to 14 reference images to produce the final image."
                - listitem [ref=e400]:
                  - strong [ref=e401]: New aspect ratios
                  - text: ": Gemini 3.1 Flash Image Preview adds 1:4, 4:1, 1:8, and 8:1"
