              - heading "Thinking Process" [level=3] [ref=e496]
              - paragraph [ref=e497]:
                - text: Gemini 3 image models are thinking models that use a reasoning process ("Thinking") for complex prompts. This feature is enabled by default and cannot be disabled in the API. To learn more about the thinking process, see the
                - link "Gemini Thinking" [ref=e498] [cursor=pointer]:
                  - /url: /gemini-api/docs/thinking
                - text: guide.
              - paragraph [ref=e499]: The model generates up to two interim images to test composition and logic. The last image within Thinking is also the final rendered image.
              - paragraph [ref=e500]: You can check the thoughts that lead to the final image being produced.
              - heading "Controlling thinking levels" [level=4] [ref=e502]
              - paragraph [ref=e503]:
                - text: With Gemini 3.1 Flash Image, you can control the amount of thinking the model uses to balance quality and latency. The default
                - code [ref=e504]: thinkingLevel
                - text: is
                - code [ref=e505]: minimal
                - text: ", and the supported levels are"
                - code [ref=e506]: minimal
                - text: and
                - code [ref=e507]: high
                - text: . Setting the
                - code [ref=e508]: thinkingLevel
                - text: to
                - code [ref=e509]: minimal
                - text: provides the lowest latency responses. Note that minimal thinking does not mean the model uses no thinking at all.
              - paragraph [ref=e510]:
                - text: You can add the
                - code [ref=e511]: includeThoughts
                - text: boolean to determine whether the model's generated thoughts are returned in the response, or remain hidden.
              - paragraph [ref=e513]:
                - text: Note that thinking tokens are billed regardless of whether
                - code [ref=e514]: includeThoughts
                - text: is set to
                - code [ref=e515]: "true"
                - text: or
                - code [ref=e516]: "false"
                - text: ", as the"
                - link "thinking process" [ref=e517] [cursor=pointer]:
                  - /url: "#thinking-process"
                - text: always happens by default whether you view the process or not.
              - heading "Thought Signatures" [level=4] [ref=e518]
              - paragraph [ref=e519]:
                - text: Thought signatures are encrypted representations of the model's internal thought process and are used to preserve reasoning context across multi-turn interactions. All responses include a
                - code [ref=e520]: thought_signature
                - text: field. As a general rule, if you receive a thought signature in a model response, you should pass it back exactly as received when sending the conversation history in the next turn. Failure to circulate thought signatures may cause the response to fail. Check the
                - link "thought signature" [ref=e521] [cursor=pointer]:
                  - /url: /gemini-api/docs/thought-signatures
                - text: documentation for more explanations of signatures overall.
              - complementary [ref=e522]:
                - strong [ref=e523]: "Note:"
                - generic [ref=e524]:
                  - text: If you use the official
                  - link "Google Gen AI SDKs" [ref=e525] [cursor=pointer]:
                    - /url: /gemini-api/docs/libraries
                  - text: and use the chat feature (or append the full model response object directly to history),
                  - strong [ref=e526]: thought signatures are handled automatically
                  - text: . You do not need to manually extract or manage them, or change your code.
              - paragraph [ref=e527]: "Here is how thought signatures work:"
              - list [ref=e528]:
                - listitem [ref=e529]:
                  - text: All
                  - code [ref=e530]: inline_data
                  - text: parts with image
                  - code [ref=e531]: mimetype
                  - text: which are part of the response should have signature.
                - listitem [ref=e532]: If there are some text parts at the beginning (before any image) right after the thoughts, the first text part should also have a signature.
                - listitem [ref=e533]:
                  - text: If
                  - code [ref=e534]: inline_data
                  - text: parts with image
                  - code [ref=e535]: mimetype
                  - text: are part of thoughts, they won't have signatures.
              - paragraph [ref=e536]: "The following code shows an example of where thought signatures are included:"
              - code [ref=e539]: "[ { \"inline_data\": { \"data\": \"<base64_image_data_0>\", \"mime_type\": \"image/png\" }, \"thought\": true // Thoughts don't have signatures }, { \"inline_data\": { \"data\": \"<base64_image_data_1>\", \"mime_type\": \"image/png\" }, \"thought\": true // Thoughts don't have signatures }, { \"inline_data\": { \"data\": \"<base64_image_data_2>\", \"mime_type\": \"image/png\" }, \"thought\": true // Thoughts don't have signatures }, { \"text\": \"Here is a step-by-step guide to baking macarons, presented in three separate images.\\n\\n### Step 1: Piping the Batter\\n\\nThe first step after making your macaron batter is to pipe it onto a baking sheet. This requires a steady hand to create uniform circles.\\n\\n\", \"thought_signature\": \"<Signature_A>\" // The first non-thought part always has a signature }, { \"inline_data\": { \"data\": \"<base64_image_data_3>\", \"mime_type\": \"image/png\" }, \"thought_signature\": \"<Signature_B>\" // All image parts have a signatures }, { \"text\": \"\\n\\n### Step 2: Baking and Developing Feet\\n\\nOnce piped, the macarons are baked in the oven. A key sign of a successful bake is the development of \\\"feet\\\"—the ruffled edge at the base of each macaron shell.\\n\\n\" // Follow-up text parts don't have signatures }, { \"inline_data\": { \"data\": \"<base64_image_data_4>\", \"mime_type\": \"image/png\" }, \"thought_signature\": \"<Signature_C>\" // All image parts have a signatures }, { \"text\": \"\\n\\n### Step 3: Assembling the Macaron\\n\\nThe final step is to pair the cooled macaron shells by size and sandwich them together with your desired filling, creating the classic macaron dessert.\\n\\n\" }, { \"inline_data\": { \"data\": \"<base64_image_data_5>\", \"mime_type\": \"image/png\" }, \"thought_signature\": \"<Signature_D>\" // All image parts have a signatures } ]"
              - heading "Other image generation modes" [level=2] [ref=e540]
