                - generic [ref=e336]:
                  - text: Prompt to prototype fully-functional, UI-complete apps, and see Nano Banana 2 integrated with real-world tools, data, and the Gemini ecosystem. All before writing a single line of code.
                  - list [ref=e337]:
                    - listitem [ref=e338]:
