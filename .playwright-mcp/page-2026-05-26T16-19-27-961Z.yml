              - heading "Best Practices" [level=3] [ref=e832]
              - paragraph [ref=e833]: To elevate your results from good to great, incorporate these professional strategies into your workflow.
              - list [ref=e834]:
                - listitem [ref=e835]:
                  - strong [ref=e836]: "Be Hyper-Specific:"
                  - text: "The more detail you provide, the more control you have. Instead of \"fantasy armor,\" describe it: \"ornate elven plate armor, etched with silver leaf patterns, with a high collar and pauldrons shaped like falcon wings.\""
                - listitem [ref=e837]:
                  - strong [ref=e838]: "Provide Context and Intent:"
                  - text: Explain the
                  - emphasis [ref=e839]: purpose
                  - text: of the image. The model's understanding of context will influence the final output. For example, "Create a logo for a high-end, minimalist skincare brand" will yield better results than just "Create a logo."
                - listitem [ref=e840]:
                  - strong [ref=e841]: "Iterate and Refine:"
                  - text: Don't expect a perfect image on the first try. Use the conversational nature of the model to make small changes. Follow up with prompts like, "That's great, but can you make the lighting a bit warmer?" or "Keep everything the same, but change the character's expression to be more serious."
                - listitem [ref=e842]:
                  - strong [ref=e843]: "Use Step-by-Step Instructions:"
                  - text: For complex scenes with many elements, break your prompt into steps. "First, create a background of a serene, misty forest at dawn. Then, in the foreground, add a moss-covered ancient stone altar. Finally, place a single, glowing sword on top of the altar."
                - listitem [ref=e844]:
                  - strong [ref=e845]: "Use \"Semantic Negative Prompts\":"
                  - text: "Instead of saying \"no cars,\" describe the desired scene positively: \"an empty, deserted street with no signs of traffic.\""
                - listitem [ref=e846]:
                  - strong [ref=e847]: "Control the Camera:"
                  - text: Use photographic and cinematic language to control the composition. Terms like
                  - code [ref=e848]: wide-angle shot
                  - text: ","
                  - code [ref=e849]: macro shot
                  - text: ","
                  - code [ref=e850]: low-angle perspective
                  - text: .
