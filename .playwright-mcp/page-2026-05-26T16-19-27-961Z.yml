              - heading "Grounding with Google Search for Images (3.1 Flash)" [level=3] [ref=e439]
              - complementary [ref=e440]:
                - strong [ref=e441]: "Note:"
                - text: This feature is only available for the Gemini 3.1 Flash Image model.
              - paragraph [ref=e442]:
                - text: Grounding with Google Search for images allows models to use web images retrieved via Google Search as visual context for image generation. Image Search is a new search type within the existing Grounding with Google Search tool, functioning alongside standard
                - link "Web Search" [ref=e443] [cursor=pointer]:
                  - /url: "#use-with-grounding"
                - text: .
              - paragraph [ref=e444]:
                - text: To enable Image Search, configure the
                - code [ref=e445]: googleSearch
                - text: tool in your API request and specify
                - code [ref=e446]: imageSearch
                - text: within the
                - code [ref=e447]: searchTypes
                - text: object. Image Search can be used independently or together with Web Search.
              - paragraph [ref=e448]: Note that Grounding with Google Search for images can't be used to search for people.
              - paragraph [ref=e450]:
                - strong [ref=e451]: Display requirements
              - paragraph [ref=e452]: "When you use Image Search within Grounding with Google Search, you must comply with the following conditions:"
              - list [ref=e453]:
                - listitem [ref=e454]:
                  - strong [ref=e455]: Source attribution
                  - text: ": You must provide a link to the webpage containing the source image (the \"containing page,\" not the image file itself) in a manner that the user will recognize as a link."
                - listitem [ref=e456]:
                  - strong [ref=e457]: Direct navigation
                  - text: ": If you also choose to display the source images, you must provide a direct, single-click path from the source images to its containing source webpage. Any other implementation that delays or abstracts the end user's access to the source webpage, including but not limited to any multi-click path or the use of an intermediate image viewer, is not permitted."
              - paragraph [ref=e458]:
                - strong [ref=e459]: Response
              - paragraph [ref=e460]:
                - text: For grounded responses using image search, the API provides clear attribution and metadata to link its output to verified sources. Key fields in the
                - code [ref=e461]: groundingMetadata
                - text: "object include:"
              - list [ref=e462]:
                - listitem [ref=e463]:
                  - strong [ref=e464]:
                    - code [ref=e465]: imageSearchQueries
                  - text: ": The specific queries used by the model for visual context (image search)."
                - listitem [ref=e466]:
                  - paragraph [ref=e467]:
                    - strong [ref=e468]:
                      - code [ref=e469]: groundingChunks
                    - text: ": Contains source information for retrieved results. For image sources, these will be returned as redirect URLs using a new image chunk type. This chunk includes:"
                  - list [ref=e470]:
                    - listitem [ref=e471]:
                      - strong [ref=e472]:
                        - code [ref=e473]: uri
                      - text: ": The web page URL for attribution (the landing page)."
                    - listitem [ref=e474]:
                      - strong [ref=e475]:
                        - code [ref=e476]: image_uri
                      - text: ": The direct image URL."
                - listitem [ref=e477]:
                  - paragraph [ref=e478]:
                    - strong [ref=e479]:
                      - code [ref=e480]: groundingSupports
                    - text: ": Provides specific mappings that link the generated content to its relevant citation source in the chunks."
                - listitem [ref=e481]:
                  - paragraph [ref=e482]:
                    - strong [ref=e483]:
                      - code [ref=e484]: searchEntryPoint
                    - text: ": Includes the \"Google Search\" chip containing compliant HTML and CSS to render Search Suggestions."
              - heading "Generate images up to 4K resolution" [level=3] [ref=e485]
              - paragraph [ref=e486]:
                - text: Gemini 3 image models generate 1K images by default but can also output 2K, 4K, and 512 (0.5K) (Gemini 3.1 Flash Image only) images. To generate higher resolution assets, specify the
                - code [ref=e487]: image_size
                - text: in the
                - code [ref=e488]: generation_config
                - text: .
              - paragraph [ref=e489]:
                - text: You must use an uppercase 'K' (e.g. 1K, 2K, 4K). The
                - code [ref=e490]: "512"
                - text: value does not use a 'K' suffix. Lowercase parameters (e.g., 1k) will be rejected.
